<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', 'Poppins', Verdana, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        
        .game-container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #10b981, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(16, 185, 129, 0.2);
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .score-card {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 12px 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .score-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
        }
        
        .score-value {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .highscore-value {
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            background: #0f172a;
            cursor: pointer;
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        
        button {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            font-size: 1rem;
            font-weight: 600;
            padding: 12px 28px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            margin: 5px;
        }
        
        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #2d3a5e, #1e293b);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 250px;
            margin: 20px auto 0;
        }
        
        .mobile-btn {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            font-size: 1.5rem;
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: bold;
        }
        
        .mobile-btn:active {
            background: #10b981;
            transform: scale(0.95);
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        
        @media (max-width: 600px) {
            .game-container {
                padding: 15px;
            }
            
            canvas {
                width: 100%;
                height: auto;
            }
            
            .score-card {
                padding: 8px 16px;
            }
            
            .score-value {
                font-size: 1.5rem;
            }
            
            .mobile-controls {
                display: grid;
            }
            
            button {
                padding: 8px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🐍 SNAKE</h1>
            <div class="subtitle">Классическая игра | Ешь яблоки, расти</div>
        </div>
        
        <div class="info-panel">
            <div class="score-card">
                <div class="score-label">СЧЁТ</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-card">
                <div class="score-label">РЕКОРД</div>
                <div class="score-value highscore-value" id="highscore">0</div>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="500" height="500"></canvas>
        
        <div class="controls">
            <button id="restartBtn">🔄 Новая игра</button>
            <button id="pauseBtn">⏸️ Пауза</button>
        </div>
        
        <div class="mobile-controls">
            <div></div>
            <div class="mobile-btn" data-dir="up">▲</div>
            <div></div>
            <div class="mobile-btn" data-dir="left">◀</div>
            <div class="mobile-btn" data-dir="down">▼</div>
            <div class="mobile-btn" data-dir="right">▶</div>
        </div>
        
        <div class="status" id="status">
            Используйте стрелки ← ↑ ↓ → или кнопки на экране
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highscoreElement = document.getElementById('highscore');
        const restartBtn = document.getElementById('restartBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const statusDiv = document.getElementById('status');
        
        const GRID_SIZE = 20;
        const CELL_SIZE = canvas.width / GRID_SIZE;
        
        let snake = [{x: 10, y: 10}];
        let direction = 'right';
        let nextDirection = 'right';
        let food = {};
        let score = 0;
        let highscore = localStorage.getItem('snakeHighscore') ? parseInt(localStorage.getItem('snakeHighscore')) : 0;
        let gameLoop = null;
        let isGameRunning = true;
        let isPaused = false;
        let gameSpeed = 150; // ← ИЗМЕНЕНО: теперь 150 мс (было 100)
        
        highscoreElement.textContent = highscore;
        
        function generateRandomFood() {
            const newFood = {
                x: Math.floor(Math.random() * GRID_SIZE),
                y: Math.floor(Math.random() * GRID_SIZE)
            };
            
            for (let segment of snake) {
                if (segment.x === newFood.x && segment.y === newFood.y) {
                    return generateRandomFood();
                }
            }
            
            return newFood;
        }
        
        function drawCell(x, y, color, isHead = false) {
            const grad = ctx.createLinearGradient(x * CELL_SIZE, y * CELL_SIZE, (x + 1) * CELL_SIZE, (y + 1) * CELL_SIZE);
            
            if (isHead) {
                grad.addColorStop(0, '#10b981');
                grad.addColorStop(1, '#059669');
            } else {
                grad.addColorStop(0, color);
                grad.addColorStop(1, color);
            }
            
            ctx.fillStyle = grad;
            ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
            
            if (isHead) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.fillRect(x * CELL_SIZE + 2, y * CELL_SIZE + 2, CELL_SIZE - 5, 3);
            }
        }
        
        function draw() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            const foodGrad = ctx.createRadialGradient(
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                2,
                food.x * CELL_SIZE + CELL_SIZE / 2,
                food.y * CELL_SIZE + CELL_SIZE / 2,
                CELL_SIZE / 2
            );
            foodGrad.addColorStop(0, '#ef4444');
            foodGrad.addColorStop(1, '#dc2626');
            ctx.fillStyle = foodGrad;
            ctx.fillRect(food.x * CELL_SIZE, food.y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fillRect(food.x * CELL_SIZE + 3, food.y * CELL_SIZE + 3, CELL_SIZE - 7, 4);
            
            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                const isHead = i === 0;
                const intensity = 0.4 + (i / snake.length) * 0.4;
                
                if (isHead) {
                    drawCell(segment.x, segment.y, '#10b981', true);
                } else {
                    const grad = ctx.createLinearGradient(
                        segment.x * CELL_SIZE,
                        segment.y * CELL_SIZE,
                        (segment.x + 1) * CELL_SIZE,
                        (segment.y + 1) * CELL_SIZE
                    );
                    grad.addColorStop(0, `rgba(52, 211, 153, ${intensity + 0.3})`);
                    grad.addColorStop(1, `rgba(16, 185, 129, ${intensity + 0.2})`);
                    ctx.fillStyle = grad;
                    ctx.fillRect(segment.x * CELL_SIZE, segment.y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                }
            }
            
            const head = snake[0];
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.35, head.y * CELL_SIZE + CELL_SIZE * 0.35, CELL_SIZE * 0.1, 0, Math.PI * 2);
            ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.65, head.y * CELL_SIZE + CELL_SIZE * 0.35, CELL_SIZE * 0.1, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.35, head.y * CELL_SIZE + CELL_SIZE * 0.35, CELL_SIZE * 0.05, 0, Math.PI * 2);
            ctx.arc(head.x * CELL_SIZE + CELL_SIZE * 0.65, head.y * CELL_SIZE + CELL_SIZE * 0.35, CELL_SIZE * 0.05, 0, Math.PI * 2);
            ctx.fill();
        }
        
        function moveSnake() {
            direction = nextDirection;
            
            const head = snake[0];
            let newHead = { ...head };
            
            switch (direction) {
                case 'right': newHead.x++; break;
                case 'left': newHead.x--; break;
                case 'up': newHead.y--; break;
                case 'down': newHead.y++; break;
            }
            
            const ateFood = (newHead.x === food.x && newHead.y === food.y);
            
            snake.unshift(newHead);
            
            if (!ateFood) {
                snake.pop();
            } else {
                score += 10;
                scoreElement.textContent = score;
                
                if (score > highscore) {
                    highscore = score;
                    highscoreElement.textContent = highscore;
                    localStorage.setItem('snakeHighscore', highscore);
                }
                
                food = generateRandomFood();
            }
            
            const headCollision = snake[0];
            
            if (headCollision.x < 0 || headCollision.x >= GRID_SIZE || headCollision.y < 0 || headCollision.y >= GRID_SIZE) {
                gameOver();
                return;
            }
            
            for (let i = 1; i < snake.length; i++) {
                if (snake[i].x === headCollision.x && snake[i].y === headCollision.y) {
                    gameOver();
                    return;
                }
            }
        }
        
        function update() {
            if (!isGameRunning || isPaused) return;
            
            moveSnake();
            draw();
        }
        
        function gameOver() {
            isGameRunning = false;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = null;
            statusDiv.innerHTML = 'ИГРА ОКОНЧЕНА<br>Нажмите "Новая игра" чтобы продолжить';
            drawGameOver();
        }
        
        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = 'bold 24px "Segoe UI", Verdana';
            ctx.fillStyle = '#ef4444';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.font = '16px "Segoe UI", Verdana';
            ctx.fillStyle = '#e2e8f0';
            ctx.fillText(`Счёт: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillText('Нажмите "Новая игра"', canvas.width / 2, canvas.height / 2 + 50);
        }
        
        function togglePause() {
            if (!isGameRunning) return;
            
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '▶️ Играть' : '⏸️ Пауза';
            statusDiv.innerHTML = isPaused ? '⏸️ ПАУЗА. Нажмите "Играть" чтобы продолжить' : 'Игра продолжается...';
            
            if (!isPaused) {
                draw();
            } else {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 24px "Segoe UI", Verdana';
                ctx.fillStyle = '#fbbf24';
                ctx.textAlign = 'center';
                ctx.fillText('ПАУЗА', canvas.width / 2, canvas.height / 2);
            }
        }
        
        function restartGame() {
            if (gameLoop) clearInterval(gameLoop);
            
            snake = [{x: 10, y: 10}];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            isGameRunning = true;
            isPaused = false;
            scoreElement.textContent = score;
            pauseBtn.textContent = '⏸️ Пауза';
            
            food = generateRandomFood();
            
            draw();
            
            gameLoop = setInterval(() => {
                update();
            }, gameSpeed);
            
            statusDiv.innerHTML = 'Игра идёт! Используйте стрелки ← ↑ ↓ →';
        }
        
        function handleKeyPress(e) {
            if (!isGameRunning || isPaused) return;
            
            const key = e.key;
            const keyMap = {
                'ArrowUp': 'up',
                'ArrowDown': 'down',
                'ArrowLeft': 'left',
                'ArrowRight': 'right'
            };
            
            const newDir = keyMap[key];
            if (!newDir) return;
            
            e.preventDefault();
            
            if ((newDir === 'right' && direction === 'left') ||
                (newDir === 'left' && direction === 'right') ||
                (newDir === 'up' && direction === 'down') ||
                (newDir === 'down' && direction === 'up')) {
                return;
            }
            
            nextDirection = newDir;
        }
        
        function setupMobileControls() {
            const buttons = document.querySelectorAll('.mobile-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    if (!isGameRunning || isPaused) return;
                    
                    const newDir = btn.getAttribute('data-dir');
                    
                    if ((newDir === 'right' && direction === 'left') ||
                        (newDir === 'left' && direction === 'right') ||
                        (newDir === 'up' && direction === 'down') ||
                        (newDir === 'down' && direction === 'up')) {
                        return;
                    }
                    
                    nextDirection = newDir;
                });
            });
        }
        
        function init() {
            highscore = localStorage.getItem('snakeHighscore') ? parseInt(localStorage.getItem('snakeHighscore')) : 0;
            highscoreElement.textContent = highscore;
            food = generateRandomFood();
            draw();
            
            restartBtn.addEventListener('click', restartGame);
            pauseBtn.addEventListener('click', togglePause);
            window.addEventListener('keydown', handleKeyPress);
            setupMobileControls();
            
            gameLoop = setInterval(() => {
                update();
            }, gameSpeed);
        }
        
        init();
    </script>
</body>
</html>
