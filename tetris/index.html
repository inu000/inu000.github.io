<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Тетрис | Tetris</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Segoe UI', 'Poppins', Verdana, Arial, sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        
        .game-container {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin: 0;
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(236, 72, 153, 0.2);
        }
        
        .subtitle {
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 5px;
        }
        
        .game-layout {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }
        
        /* Основное поле */
        .play-area {
            text-align: center;
        }
        
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
            background: #0f172a;
        }
        
        /* Информационная панель */
        .info-panel {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 150px;
        }
        
        .next-piece {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .next-piece h3 {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        
        .next-canvas {
            background: #0f172a;
            border-radius: 12px;
            margin: 0 auto;
        }
        
        .score-card {
            text-align: center;
            margin: 15px 0;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
        }
        
        .score-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
        }
        
        .score-value {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        
        button {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            font-size: 1rem;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
            margin: 5px;
        }
        
        button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #2d3a5e, #1e293b);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        /* Мобильное управление */
        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-width: 250px;
            margin: 20px auto 0;
        }
        
        .mobile-btn {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #e2e8f0;
            font-size: 1.3rem;
            padding: 12px;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: bold;
            text-align: center;
        }
        
        .mobile-btn:active {
            background: #ec4899;
            transform: scale(0.95);
        }
        
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        
        @media (max-width: 700px) {
            .game-container {
                padding: 15px;
            }
            
            .info-panel {
                padding: 15px;
                min-width: 120px;
            }
            
            .score-value {
                font-size: 1.5rem;
            }
            
            .mobile-controls {
                display: grid;
            }
            
            button {
                padding: 8px 16px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🎮 TETRIS</h1>
            <div class="subtitle">Классическая игра | Собирай линии, набирай очки</div>
        </div>
        
        <div class="game-layout">
            <div class="play-area">
                <canvas id="tetrisCanvas" width="300" height="600"></canvas>
            </div>
            
            <div class="info-panel">
                <div class="next-piece">
                    <h3>СЛЕДУЮЩАЯ</h3>
                    <canvas id="nextCanvas" width="120" height="120" class="next-canvas"></canvas>
                </div>
                
                <div class="score-card">
                    <div class="score-label">СЧЁТ</div>
                    <div class="score-value" id="score">0</div>
                </div>
                
                <div class="score-card">
                    <div class="score-label">ЛИНИИ</div>
                    <div class="score-value" id="lines">0</div>
                </div>
                
                <div class="controls">
                    <button id="restartBtn">🔄 Новая игра</button>
                    <button id="pauseBtn">⏸️ Пауза</button>
                </div>
            </div>
        </div>
        
        <div class="mobile-controls">
            <div></div>
            <div class="mobile-btn" data-action="rotate">🔄</div>
            <div></div>
            <div class="mobile-btn" data-action="left">◀</div>
            <div class="mobile-btn" data-action="down">▼</div>
            <div class="mobile-btn" data-action="right">▶</div>
        </div>
        
        <div class="status" id="status">
            ← → ↓ двигают фигуру | ↑ поворот | Пробел - сброс
        </div>
    </div>

    <script>
        // Настройки
        const canvas = document.getElementById('tetrisCanvas');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const linesElement = document.getElementById('lines');
        const restartBtn = document.getElementById('restartBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const statusDiv = document.getElementById('status');
        
        const COLS = 10;
        const ROWS = 20;
        const CELL_SIZE = canvas.width / COLS;
        const NEXT_CELL_SIZE = nextCanvas.width / 4;
        
        // Фигуры тетрамино
        const SHAPES = [
            {   // I
                shape: [[1,1,1,1]],
                color: '#06b6d4'
            },
            {   // O
                shape: [[1,1],[1,1]],
                color: '#fbbf24'
            },
            {   // T
                shape: [[0,1,0],[1,1,1]],
                color: '#a855f7'
            },
            {   // S
                shape: [[0,1,1],[1,1,0]],
                color: '#10b981'
            },
            {   // Z
                shape: [[1,1,0],[0,1,1]],
                color: '#ef4444'
            },
            {   // L
                shape: [[1,0,0],[1,1,1]],
                color: '#f97316'
            },
            {   // J
                shape: [[0,0,1],[1,1,1]],
                color: '#3b82f6'
            }
        ];
        
        // Игровые переменные
        let board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
        let currentPiece = null;
        let nextPiece = null;
        let currentX = 0;
        let currentY = 0;
        let score = 0;
        let lines = 0;
        let gameLoop = null;
        let isGameRunning = true;
        let isPaused = false;
        let gameSpeed = 400; // мс на падение
        
        // Получение случайной фигуры
        function getRandomPiece() {
            const idx = Math.floor(Math.random() * SHAPES.length);
            const piece = SHAPES[idx];
            return {
                shape: piece.shape.map(row => [...row]),
                color: piece.color
            };
        }
        
        // Создание новой фигуры
        function spawnNewPiece() {
            if (!nextPiece) {
                nextPiece = getRandomPiece();
            }
            
            currentPiece = nextPiece;
            nextPiece = getRandomPiece();
            
            currentX = Math.floor((COLS - currentPiece.shape[0].length) / 2);
            currentY = 0;
            
            // Проверка на Game Over
            if (collision()) {
                gameOver();
                return false;
            }
            
            drawNext();
            return true;
        }
        
        // Проверка столкновений
        function collision() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x <currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        const boardX = currentX + x;
                        const boardY = currentY + y;
                        
                        if (boardX < 0 || boardX >= COLS || boardY >= ROWS || boardY < 0) {
                            return true;
                        }
                        
                        if (boardY >= 0 && board[boardY][boardX] !== 0) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }
        
        // Фиксация фигуры на поле
        function mergePiece() {
            for (let y = 0; y < currentPiece.shape.length; y++) {
                for (let x = 0; x < currentPiece.shape[y].length; x++) {
                    if (currentPiece.shape[y][x]) {
                        const boardX = currentX + x;
                        const boardY = currentY + y;
                        if (boardY >= 0 && boardY < ROWS && boardX >= 0 && boardX < COLS) {
                            board[boardY][boardX] = currentPiece.color;
                        }
                    }
                }
            }
            
            // Проверка заполненных линий
            let linesCleared = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                let full = true;
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x] === 0) {
                        full = false;
                        break;
                    }
                }
                
                if (full) {
                    // Удаляем линию
                    for (let row = y; row > 0; row--) {
                        board[row] = [...board[row-1]];
                    }
                    board[0] = Array(COLS).fill(0);
                    linesCleared++;
                    y++; // Проверяем ту же строку снова
                }
            }
            
            // Обновление счёта
            if (linesCleared > 0) {
                const points = [0, 100, 300, 600, 1000];
                const addScore = points[Math.min(linesCleared, 4)];
                score += addScore;
                lines += linesCleared;
                updateScore();
            }
            
            spawnNewPiece();
            draw();
        }
        
        // Движение фигуры
        function movePiece(dx, dy) {
            if (!isGameRunning || isPaused) return false;
            
            currentX += dx;
            currentY += dy;
            
            if (collision()) {
                currentX -= dx;
                currentY -= dy;
                
                if (dy === 1) {
                    mergePiece();
                }
                return false;
            }
            
            draw();
            return true;
        }
        
        // Поворот фигуры
        function rotatePiece() {
            if (!isGameRunning || isPaused) return;
            
            const rotated = currentPiece.shape[0].map((_, idx) => 
                currentPiece.shape.map(row => row[idx]).reverse()
            );
            
            const originalShape = currentPiece.shape;
            currentPiece.shape = rotated;
            
            if (collision()) {
                currentPiece.shape = originalShape;
            }
            
            draw();
        }
        
        // Быстрый сброс вниз
        function hardDrop() {
            if (!isGameRunning || isPaused) return;
            
            while (!collision()) {
                currentY++;
            }
            currentY--;
            mergePiece();
            draw();
        }
        
        // Отрисовка поля
        function draw() {
            // Отрисовка сетки
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Отрисовка сетки линий
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
            
            // Отрисовка зафиксированных фигур
            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    if (board[y][x] !== 0) {
                        ctx.fillStyle = board[y][x];
                        ctx.fillRect(x * CELL_SIZE, y * CELL_SIZE, CELL_SIZE - 1, CELL_SIZE - 1);
                        
                        // Добавляем блик
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                        ctx.fillRect(x * CELL_SIZE + 2, y * CELL_SIZE + 2, CELL_SIZE - 5, 3);
                    }
                }
            }
            
            // Отрисовка текущей фигуры
            if (currentPiece) {
                for (let y = 0; y < currentPiece.shape.length; y++) {
                    for (let x = 0; x < currentPiece.shape[y].length; x++) {
                        if (currentPiece.shape[y][x]) {
                            const drawX = (currentX + x) * CELL_SIZE;
                            const drawY = (currentY + y) * CELL_SIZE;
                            
                            ctx.fillStyle = currentPiece.color;
                            ctx.fillRect(drawX, drawY, CELL_SIZE - 1, CELL_SIZE - 1);
                            
                            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                            ctx.fillRect(drawX + 2, drawY + 2, CELL_SIZE - 5, 3);
                        }
                    }
                }
            }
        }
        
        // Отрисовка следующей фигуры
        function drawNext() {
            nextCtx.fillStyle = '#0f172a';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            if (nextPiece) {
                const shape = nextPiece.shape;
                const color = nextPiece.color;
                const shapeWidth = shape[0].length;
                const shapeHeight = shape.length;
                const offsetX = (4 - shapeWidth) * NEXT_CELL_SIZE / 2;
                const offsetY = (4 - shapeHeight) * NEXT_CELL_SIZE / 2;
                
                for (let y = 0; y < shape.length; y++) {
                    for (let x = 0; x < shape[y].length; x++) {
                        if (shape[y][x]) {
                            nextCtx.fillStyle = color;
                            nextCtx.fillRect(offsetX + x * NEXT_CELL_SIZE, offsetY + y * NEXT_CELL_SIZE, NEXT_CELL_SIZE - 2, NEXT_CELL_SIZE - 2);
                            
                            nextCtx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                            nextCtx.fillRect(offsetX + x * NEXT_CELL_SIZE + 2, offsetY + y * NEXT_CELL_SIZE + 2, NEXT_CELL_SIZE - 6, 3);
                        }
                    }
                }
            }
        }
        
        // Обновление счёта
        function updateScore() {
            scoreElement.textContent = score;
            linesElement.textContent = lines;
        }
        
        // Game Over
        function gameOver() {
            isGameRunning = false;
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = null;
            statusDiv.innerHTML = '💀 ИГРА ОКОНЧЕНА 💀<br>Нажмите "Новая игра" чтобы продолжить';
            drawGameOver();
        }
        
        function drawGameOver() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.font = 'bold 20px "Segoe UI", Verdana';
            ctx.fillStyle = '#ef4444';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.font = '14px "Segoe UI", Verdana';
            ctx.fillStyle = '#e2e8f0';
            ctx.fillText(`Счёт: ${score}`, canvas.width / 2, canvas.height / 2 + 20);
            ctx.fillText('Линий: ' + lines, canvas.width / 2, canvas.height / 2 + 45);
        }
        
        // Пауза
        function togglePause() {
            if (!isGameRunning) return;
            
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '▶️ Играть' : '⏸️ Пауза';
            statusDiv.innerHTML = isPaused ? '⏸️ ПАУЗА' : 'Игра продолжается...';
            
            if (!isPaused) {
                draw();
            } else {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 24px "Segoe UI", Verdana';
                ctx.fillStyle = '#fbbf24';
                ctx.textAlign = 'center';
                ctx.fillText('ПАУЗА', canvas.width / 2, canvas.height / 2);
            }
        }
        
        // Перезапуск игры
        function restartGame() {
            if (gameLoop) clearInterval(gameLoop);
            
            // Очистка поля
            board = Array(ROWS).fill().map(() => Array(COLS).fill(0));
            score = 0;
            lines = 0;
            isGameRunning = true;
            isPaused = false;
            updateScore();
            pauseBtn.textContent = '⏸️ Пауза';
            
            // Создание фигур
            nextPiece = getRandomPiece();
            spawnNewPiece();
            
            draw();
            drawNext();
            
            gameLoop = setInterval(() => {
                if (isGameRunning && !isPaused) {
                    movePiece(0, 1);
                }
            }, gameSpeed);
            
            statusDiv.innerHTML = 'Игра идёт! Стрелки управляют фигурой';
        }
        
        // Управление с клавиатуры
        function handleKeyPress(e) {
            if (!isGameRunning) return;
            
            const key = e.key;
            e.preventDefault();
            
            switch(key) {
                case 'ArrowLeft': movePiece(-1, 0); break;
                case 'ArrowRight': movePiece(1, 0); break;
                case 'ArrowDown': movePiece(0, 1); break;
                case 'ArrowUp': rotatePiece(); break;
                case ' ': hardDrop(); break;
                case 'p': case 'P': togglePause(); break;
            }
        }
        
        // Мобильное управление
        function setupMobileControls() {
            const buttons = document.querySelectorAll('.mobile-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const action = btn.getAttribute('data-action');
                    
                    switch(action) {
                        case 'left': movePiece(-1, 0); break;
                        case 'right': movePiece(1, 0); break;
                        case 'down': movePiece(0, 1); break;
                        case 'rotate': rotatePiece(); break;
                    }
                });
            });
        }
        
        // Инициализация
        function init() {
            restartGame();
            
            restartBtn.addEventListener('click', restartGame);
            pauseBtn.addEventListener('click', togglePause);
            window.addEventListener('keydown', handleKeyPress);
            setupMobileControls();
        }
        
        init();
    </script>
</body>
</html>
